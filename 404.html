<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ページが見つかりません | みずきアセットアセスメント合同会社</title>
<link rel="icon" href="/favicon.ico" type="image/x-icon">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="anonymous">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;600&family=Noto+Serif+JP:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --color-primary: #1a5c3a;
    --color-accent: #b8860b;
    --color-text: #2c2c2c;
    --color-text-light: #5a5a5a;
    --color-bg: #fafaf8;
    --color-white: #ffffff;
    --color-border: #e0ddd8;
    --font-serif: 'Noto Serif JP', serif;
    --font-sans: 'Noto Sans JP', sans-serif;
  }

  *, *::before, *::after {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  body {
    font-family: var(--font-sans);
    color: var(--color-text);
    background: var(--color-bg);
    line-height: 1.8;
    display: flex;
    flex-direction: column;
    min-height: 100vh;
  }

  header {
    background: var(--color-white);
    border-bottom: 1px solid var(--color-border);
    padding: 16px 24px;
  }

  .logo {
    max-width: 1100px;
    margin: 0 auto;
    display: flex;
    align-items: center;
    gap: 12px;
    text-decoration: none;
    color: inherit;
  }

  .logo img {
    width: 40px;
    height: 40px;
    border-radius: 6px;
    object-fit: cover;
  }

  .logo-main {
    font-family: var(--font-serif);
    font-size: 1.15rem;
    font-weight: 600;
    color: var(--color-primary);
    letter-spacing: 0.08em;
  }

  main {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 60px 24px;
    text-align: center;
  }

  .error-code {
    font-family: var(--font-serif);
    font-size: 4rem;
    font-weight: 500;
    color: var(--color-primary);
    line-height: 1.2;
    margin-bottom: 16px;
  }

  .error-message {
    font-size: 1.1rem;
    color: var(--color-text);
    margin-bottom: 8px;
  }

  .error-description {
    font-size: 0.85rem;
    color: var(--color-text-light);
    margin-bottom: 32px;
  }

  .back-link {
    display: inline-block;
    text-decoration: none;
    color: var(--color-white);
    background: var(--color-primary);
    padding: 12px 32px;
    font-size: 0.85rem;
    font-weight: 500;
    letter-spacing: 0.05em;
    transition: background 0.3s;
  }

  .back-link:hover {
    background: #2a7a50;
  }

  footer {
    background: #0f2a1c;
    color: rgba(255,255,255,0.7);
    text-align: center;
    padding: 28px 24px;
    font-size: 0.72rem;
    letter-spacing: 0.08em;
  }
</style>
</head>
<body>

<header>
  <a href="/" class="logo">
    <img src="/icon.png" alt="みずきアセットアセスメント" width="40" height="40">
    <span class="logo-main">みずきアセットアセスメント</span>
  </a>
</header>

<main>
  <div>
    <div class="error-code">404</div>
    <p class="error-message">ページが見つかりません</p>
    <p class="error-description">お探しのページは移動または削除された可能性があります。</p>
    <a href="/" class="back-link">トップページへ戻る</a>
  </div>
</main>

<footer>
  <p>&copy; 2026 みずきアセットアセスメント合同会社 All Rights Reserved.</p>
</footer>

</body>
</html>
